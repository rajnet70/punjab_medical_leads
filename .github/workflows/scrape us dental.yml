name: US Dental Clinic Scraper

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Select US city to scrape'
        required: true
        default: 'New York'
        type: choice
        options:
          - New York
          - Los Angeles
          - Chicago
          - Houston
          - Phoenix
          - Philadelphia
          - San Antonio
          - San Diego
          - Dallas
          - San Jose
      limit:
        description: 'Number of results to scrape'
        required: true
        default: '50'
        type: choice
        options:
          - '50'
          - '100'
          - '200'
          - '500'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml openpyxl

      - name: Run scraper
        env:
          CITY: ${{ github.event.inputs.city }}
          LIMIT: ${{ github.event.inputs.limit }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python us_dental_scraper.py

      - name: Run website enrichment
        env:
          CITY: ${{ github.event.inputs.city }}
        run: python us_dental_enricher.py

      - name: Upload enriched Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.city }}-Dental-Clinics-Enriched
          path: output/${{ github.event.inputs.city }}_Dental_Clinics_Enriched.xlsx
          retention-days: 30

      - name: Upload raw Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.city }}-Dental-Clinics-Raw
          path: output/${{ github.event.inputs.city }}_Dental_Clinics.xlsx
          retention-days: 30

      - name: Commit Excel files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.xlsx
          git diff --staged --quiet || git commit -m "Add ${{ github.event.inputs.city }} dental clinics data $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
