name: Texas Dental Supplier Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml openpyxl

      - name: Run Texas Supplier Scraper
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LIMIT: '25'
        run: python texas_supplier_scraper.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Texas-Dental-Suppliers
          path: output/Texas_Dental_Suppliers.xlsx
          retention-days: 30

      - name: Commit to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.xlsx
          git diff --staged --quiet || git commit -m "Add Texas dental suppliers $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
