name: Punjab Medical Leads Scraper

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Select city to scrape'
        required: true
        default: 'Lahore'
        type: choice
        options:
          - Lahore
          - Rawalpindi
          - Gujranwala
          - Multan
          - Sargodha
          - Sialkot
          - Bahawalpur
          - Gujrat
          - Sahiwal

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml openpyxl

      - name: Run scraper
        env:
          CITY: ${{ github.event.inputs.city }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scraper.py

      - name: Upload Excel file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.city }}-Doctors
          path: output/${{ github.event.inputs.city }}_Doctors.xlsx
          retention-days: 30

      - name: Commit Excel file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.xlsx
          git diff --staged --quiet || git commit -m "Add ${{ github.event.inputs.city }} doctors data $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
