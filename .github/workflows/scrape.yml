name: Punjab Medical Leads Scraper

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Scrape a single city (leave empty to scrape ALL 20 cities)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - Lahore
          - Faisalabad
          - Rawalpindi
          - Gujranwala
          - Multan
          - Bahawalpur
          - Sargodha
          - Sialkot
          - Sheikhupura
          - Rahim Yar Khan
          - Jhang
          - Gujrat
          - Sahiwal
          - Okara
          - Kasur
          - Dera Ghazi Khan
          - Muzaffargarh
          - Chiniot
          - Hafizabad
          - Mandi Bahauddin

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml openpyxl

      - name: Run scraper
        env:
          CITY: ${{ github.event.inputs.city }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python lahore_doctor_counter.py

      - name: Upload Excel files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Punjab-Medical-Leads
          path: output/*.xlsx
          retention-days: 30

      - name: Commit Excel files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.xlsx
          git diff --staged --quiet || git commit -m "Update leads: ${{ github.event.inputs.city || 'All Punjab' }} $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
